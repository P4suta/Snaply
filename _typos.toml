# typos-cli configuration (hygiene job in ci.yml).
[default.extend-words]
# Project vocabulary that would otherwise trip the spell-checker.
Snaply = "Snaply"
WGC = "WGC"                # Windows.Graphics.Capture
OKLCH = "OKLCH"            # perceptual colour space for the auto background
apphost = "apphost"        # the .NET application host stub
Writeable = "Writeable"    # the .NET type is WriteableBitmap (with the extra 'e')
iy = "iy"                  # geometry variable (intersection height; pairs with ix)

[files]
# Generated output (bundle, docfx site, mutation output) is not our prose.
# typos scans the working tree, not just tracked files, so exclude these here
# in addition to .gitignore.
extend-exclude = ["build/", "docs/_site/", "docs/api/", "StrykerOutput/"]
