[tools]
dotnet = "10.0.301"
# Git-hook manager. `lefthook install` wires the commit-msg (committed) and
# pre-commit (typos) hooks; pinning it here provisions it via `mise install`.
lefthook = "2"
# Conventional-Commits linter for the lefthook commit-msg hook — the local guard
# that keeps release-please's version + CHANGELOG derivation fed with well-formed
# commits. cargo backend, binstalled.
"cargo:committed" = "1"
# Typo linter for the lefthook pre-commit hook (config: _typos.toml); mirrors the
# crate-ci/typos check in ci.yml so the local and CI signals match. cargo backend.
"cargo:typos-cli" = "1"

[settings]
experimental = true
# Fetch cargo: backend tools as prebuilt binaries (cargo-binstall) rather than
# `cargo install` from source — much faster locally and in CI.
cargo.binstall = true
