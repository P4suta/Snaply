name: Feature request
description: Describe a current capture workflow problem
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the present user need and why the existing capture flow cannot solve it.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include frequency, affected users, and measurable impact.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Smallest solution
      description: Prefer simplifying an existing flow over adding a new mode or setting.
    validations:
      required: true
