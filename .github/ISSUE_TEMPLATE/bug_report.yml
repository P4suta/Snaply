name: Bug report
description: Report incorrect Snaply behavior
labels: [bug]
body:
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the capture mode, display layout, DPI, HDR state, and exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Snaply version
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and architecture
      placeholder: Windows 11 24H2 build 26100, x64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant warnings or errors
      description: Redact personal paths before pasting excerpts from `%LOCALAPPDATA%\Snaply\Logs`.
      render: text
