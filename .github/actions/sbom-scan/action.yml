name: Generate SBOM and scan for vulnerabilities
description: >-
  Generate the CycloneDX 1.6 SBOM for the shipped C# closure into build/sbom/
  and gate on known-vulnerable dependencies (osv-scanner over the SBOM). The
  single source shared by release.yml (release gate) and sbom-monitor.yml so the
  tool versions never drift. Requires the mise toolchain installed and NuGet
  already restored (e.g. after `just publish`). No secrets needed.

runs:
  using: composite
  steps:
    # SBOM tooling (release/monitor-only; deliberately not in mise.toml's dev
    # loop). Version-pinned; NuGet verifies package integrity against its
    # immutable index, so a pinned version is fetched reproducibly. Append the
    # dotnet global-tool dir to PATH for the SBOM step.
    - name: Install SBOM tool
      shell: pwsh
      run: |
        dotnet tool install --global CycloneDX --version 6.2.0
        "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    # SBOM (CycloneDX 1.6 JSON) for the App project — its transitive closure
    # covers Snaply.Core and Snaply.Platform (the shipped code). Generated after
    # the build so the resolved graph matches what shipped.
    - name: Generate C# SBOM (CycloneDX)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build/sbom | Out-Null
        dotnet CycloneDX src/Snaply.App/Snaply.App.csproj `
          --output build/sbom --filename snaply.cdx.json `
          --output-format Json --spec-version 1.6 --runtime win-x64

    - name: Install osv-scanner
      uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
      with:
        tool: osv-scanner@2.3.6

    # Gate on known-vulnerable deps in the resolved shipped closure. Accepted /
    # unfixable advisories are listed in osv-scanner.toml.
    - name: Scan SBOM for known vulnerabilities (gate)
      shell: pwsh
      run: >-
        osv-scanner scan source
        -L build/sbom/snaply.cdx.json
        --config osv-scanner.toml
