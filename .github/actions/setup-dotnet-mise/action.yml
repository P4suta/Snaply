name: Set up the mise toolchain + NuGet cache
description: >-
  Provision the pinned .NET SDK + just from mise.toml (jdx/mise-action) and warm
  the NuGet package cache keyed on the committed packages.lock.json files. The
  single source for toolchain setup so every job builds on the exact same pins.
  Assumes the repo is already checked out.

runs:
  using: composite
  steps:
    - name: Provision mise toolchain (dotnet + just)
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install: true

    - name: Cache NuGet packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: nuget-${{ runner.os }}-
