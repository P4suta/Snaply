# release-please tracks its Release PR by the `autorelease: pending` label and,
# after merge, finds the merged PR carrying it to cut the tag + GitHub Release.
# Strip that label and the release would silently never be cut. GitHub has no
# per-label lock, so instead: if anyone removes `autorelease: pending` from an
# open release-please PR, put it straight back.
#
# pull_request_target so it runs from main's definition with a write token, only
# calls the API (never checks out PR code), and is scoped to release-please's own
# branch — safe, never touches normal PRs. The human approval label
# `release: approved` is deliberately NOT guarded: removing it is legitimate.
name: release-label-guard

on:
  pull_request_target:
    types: [unlabeled]

permissions:
  contents: read

jobs:
  reinstate:
    # Only guard the label on an OPEN release PR: once merged/closed, a lingering
    # `autorelease: pending` would make release-please try to RE-release it.
    if: >-
      github.event.pull_request.state == 'open'
      && startsWith(github.event.pull_request.head.ref, 'release-please--')
      && github.event.label.name == 'autorelease: pending'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Reinstate release-please's tracking label
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "autorelease: pending"
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Restored the \`autorelease: pending\` label — release-please needs it to cut the \`vX.Y.Z\` tag and Release after merge; removing it would silently skip the release. To stop a release, just don't merge (or remove \`release: approved\`)."
