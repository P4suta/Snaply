name: nightly

on:
  schedule:
    - cron: "27 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  TESTINGPLATFORM_TELEMETRY_OPTOUT: "1"

jobs:
  native:
    name: native-${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            platform: x64
            rid: win-x64
            runner: windows-latest
          - architecture: arm64
            platform: ARM64
            rid: win-arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          architecture: ${{ matrix.architecture }}
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - uses: microsoft/setup-WinAppCli@b93bbddc1f7abc061ca0d3a8119e3a0c7dd71495
        with:
          version: v0.3.1
      # Restore with ReadyToRun on so the crossgen2 runtime pack is fetched here; the
      # publish below runs --no-restore, so without it R2R fails (NETSDK1094).
      - run: dotnet restore Snaply.slnx --locked-mode -p:PublishReadyToRun=true
      - run: dotnet test tests/Snaply.Tests/Snaply.Tests.csproj -c Release --no-restore
      - if: matrix.architecture == 'x64'
        run: dotnet test tests/Snaply.App.Tests/Snaply.App.Tests.csproj -c Release --no-restore
      - name: Publish native portable payload
        run: >-
          dotnet publish src/Snaply.App/Snaply.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:Platform=${{ matrix.platform }}
          -p:WindowsPackageType=None
          --self-contained true
          -o build/native
          --no-restore
      - name: Repeat UI journeys five times
        shell: pwsh
        run: |
          1..5 | ForEach-Object {
            $process = Start-Process build/native/Snaply.exe -PassThru
            try {
              ./src/Snaply.App/ui-tests.ps1 `
                -AppPid $process.Id `
                -Architecture ${{ matrix.architecture }}
              if ($LASTEXITCODE -ne 0) { throw "UI pass $_ failed." }
            }
            finally {
              $null = $process.CloseMainWindow()
              if (-not $process.WaitForExit(5000)) {
                Stop-Process -Id $process.Id -Force
              }
            }
          }
      - name: Run 100-capture soak
        shell: pwsh
        run: |
          $process = Start-Process build/native/Snaply.exe -PassThru
          try {
            ./src/Snaply.App/ui-tests.ps1 `
              -AppPid $process.Id `
              -Architecture ${{ matrix.architecture }} `
              -SoakIterations 100
            if ($LASTEXITCODE -ne 0) { throw "Soak failed." }
            if (@(Get-NetTCPConnection -OwningProcess $process.Id -ErrorAction SilentlyContinue).Count) {
              throw "Snaply opened a TCP socket."
            }
          }
          finally {
            $null = $process.CloseMainWindow()
            if (-not $process.WaitForExit(5000)) {
              Stop-Process -Id $process.Id -Force
            }
          }
      # A UI failure otherwise reports only "element did not appear"; Snaply's own log
      # carries the exception behind it, so ship it alongside the results.
      - name: Collect app logs
        if: always()
        shell: pwsh
        run: |
          $logs = Join-Path $env:LOCALAPPDATA 'Snaply\Logs'
          # An empty folder is dropped by upload-artifact, so say out loud which case
          # this is: no folder means the app never got as far as configuring logging,
          # an empty one means it ran and logged nothing.
          if (-not (Test-Path $logs)) {
            Write-Host "No log directory at $logs."
            exit 0
          }
          $files = @(Get-ChildItem $logs -File)
          Write-Host "Log directory holds $($files.Count) file(s)."
          foreach ($file in $files) {
            Write-Host "--- $($file.Name) ---"
            Get-Content $file.FullName | Write-Host
          }
          New-Item -ItemType Directory -Force -Path artifacts/ui/app-logs | Out-Null
          Copy-Item "$logs\*" artifacts/ui/app-logs -Recurse -Force
      # Only reached when the UI journeys and the soak both passed, so the payload
      # published here is one that survived every nightly gate.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-${{ matrix.architecture }}
          path: build/native
          retention-days: 14
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ui-${{ matrix.architecture }}
          path: artifacts/ui
          if-no-files-found: error

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore tests/Snaply.Tests/Snaply.Tests.csproj --locked-mode
      - run: dotnet tool install --tool-path build/tools dotnet-stryker --version 4.16.0
      - name: Mutation test Imaging
        working-directory: tests/Snaply.Tests
        run: >-
          ../../build/tools/dotnet-stryker
          --test-runner mtp
          --break-at 85
          --reporter progress
          --reporter html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutation-report
          path: tests/Snaply.Tests/StrykerOutput/**/reports/mutation-report.html
          if-no-files-found: error

  reproducibility:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Build twice
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props -Raw
          $version = "$($props.Project.PropertyGroup.Version)"
          ./scripts/test-reproducibility.ps1 -Version $version
