name: release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Version tag such as v1.2.3
        required: true
        type: string
      sha:
        description: Full release commit SHA
        required: true
        type: string
      publish:
        description: Publish after every gate passes
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  TESTINGPLATFORM_TELEMETRY_OPTOUT: "1"
  REF: ${{ inputs.sha }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Validate release inputs
        shell: pwsh
        env:
          TAG: ${{ inputs.tag_name }}
          SHA: ${{ inputs.sha }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
        run: |
          if ($env:TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "tag_name must be vMAJOR.MINOR.PATCH."
          }
          if ($env:SHA -notmatch '^[0-9a-f]{40}$') {
            throw "sha must be a full lowercase commit SHA."
          }
          if ([string]::IsNullOrWhiteSpace($env:MSIX_PUBLISHER)) {
            throw "The MSIX_PUBLISHER repository variable is required."
          }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.REF }}
          fetch-depth: 0
      - name: Verify release tag and commit
        shell: pwsh
        env:
          TAG: ${{ inputs.tag_name }}
          SHA: ${{ inputs.sha }}
        run: |
          $head = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $head -ne $env:SHA) {
            throw "The checked-out commit does not match sha."
          }
          $tagCommit = (git rev-parse "refs/tags/$env:TAG^{commit}").Trim()
          if ($LASTEXITCODE -ne 0 -or $tagCommit -ne $head) {
            throw "The release tag does not identify sha."
          }
          git merge-base --is-ancestor $head origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "The release commit is not in main."
          }
          [xml]$props = Get-Content Directory.Build.props -Raw
          if ("v$($props.Project.PropertyGroup.Version)" -ne $env:TAG) {
            throw "The release tag does not match the project version."
          }
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Build unsigned release payloads
        shell: pwsh
        env:
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
        run: |
          $version = '${{ inputs.tag_name }}'.TrimStart('v')
          ./scripts/release.ps1 -Action Build -Version $version `
            -Publisher $env:MSIX_PUBLISHER
      - name: Generate SPDX SBOM
        shell: pwsh
        run: |
          dotnet tool install --tool-path build/tools `
            Microsoft.Sbom.DotNetTool --version 4.1.5
          ./build/tools/sbom-tool generate `
            -b build/release `
            -bc . `
            -pn Snaply `
            -pv '${{ inputs.tag_name }}'.TrimStart('v') `
            -ps P4suta `
            -nsb https://github.com/P4suta/Snaply
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: osv-scanner@2.3.6
      - name: Scan release SBOM
        run: >-
          osv-scanner scan source
          -L build/release/_manifest/spdx_2.2/manifest.spdx.json
          --config osv-scanner.toml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release
          path: build/release
          retention-days: 1
          if-no-files-found: error

  sign:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 25
    environment: release
    permissions:
      contents: read
    env:
      HAVE_SIGNING: ${{ secrets.ES_USERNAME != '' && secrets.ES_PASSWORD != '' && secrets.CREDENTIAL_ID != '' && secrets.ES_TOTP_SECRET != '' }}
      SIGNER_SUBJECT_CONTAINS: ${{ vars.SIGNER_SUBJECT_CONTAINS }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.REF }}
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore src/Snaply.App/Snaply.App.csproj --locked-mode
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-release
          path: build/release
      - name: Require production signing configuration
        shell: pwsh
        run: |
          if ($env:HAVE_SIGNING -ne 'true') {
            throw "All SSL.com eSigner secrets are required."
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNER_SUBJECT_CONTAINS)) {
            throw "SIGNER_SUBJECT_CONTAINS is required."
          }
      - name: Sign portable first-party binaries
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          dir_path: ${{ github.workspace }}\build\release\sign-stage\portable
          output_path: ${{ github.workspace }}\build\release\signed\portable
          environment_name: PROD
          malware_block: "true"
      - name: Sign MSIX bundle
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          dir_path: ${{ github.workspace }}\build\release\sign-stage\msix
          output_path: ${{ github.workspace }}\build\release\signed\msix
          environment_name: PROD
          malware_block: "true"
      - name: Collect and verify signed payloads
        shell: pwsh
        run: |
          $version = '${{ inputs.tag_name }}'.TrimStart('v')
          ./scripts/release.ps1 -Action Collect -Version $version
          ./scripts/release.ps1 -Action Verify -Version $version `
            -SignerSubjectContains $env:SIGNER_SUBJECT_CONTAINS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release
          path: build/release
          retention-days: 1
          if-no-files-found: error

  wack:
    needs: sign
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release
          path: build/release
      - name: Run Windows App Certification Kit
        shell: pwsh
        run: |
          $appcert = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\App Certification Kit" `
            -Filter appcert.exe -File -ErrorAction Stop |
            Select-Object -First 1
          $bundle = Get-ChildItem build/release/msix -Filter *.msixbundle -File |
            Select-Object -First 1
          & $appcert.FullName reset
          if ($LASTEXITCODE -ne 0) { throw "WACK reset failed." }
          & $appcert.FullName test -appxpackagepath $bundle.FullName `
            -reportoutputpath "$pwd\build\wack-report.xml"
          if ($LASTEXITCODE -ne 0) { throw "WACK failed." }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: wack-report
          path: build/wack-report.xml
          if-no-files-found: error

  qa:
    needs: sign
    name: qa-${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-latest
          - architecture: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.REF }}
      - uses: microsoft/setup-WinAppCli@b93bbddc1f7abc061ca0d3a8119e3a0c7dd71495
        with:
          version: v0.3.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release
          path: build/release
      - name: Download previous MSIX for upgrade testing
        id: previous
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path build/previous -Force | Out-Null
          gh release download --pattern '*.msixbundle' --dir build/previous
          if ($LASTEXITCODE -eq 0) {
            $previous = Get-ChildItem build/previous -Filter *.msixbundle -File |
              Select-Object -First 1
            "path=$($previous.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            "path=" >> $env:GITHUB_OUTPUT
          }
      - name: Test portable and MSIX release artifacts
        shell: pwsh
        run: |
          ./scripts/release-qa.ps1 `
            -ReleaseRoot build/release `
            -Architecture ${{ matrix.architecture }} `
            -PreviousMsixBundle '${{ steps.previous.outputs.path }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: release-qa-${{ matrix.architecture }}
          path: artifacts/ui
          if-no-files-found: error

  publish:
    needs: [sign, wack, qa]
    if: ${{ inputs.publish }}
    runs-on: windows-latest
    timeout-minutes: 25
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      SIGNER_SUBJECT_CONTAINS: ${{ vars.SIGNER_SUBJECT_CONTAINS }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.REF }}
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore src/Snaply.App/Snaply.App.csproj --locked-mode
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release
          path: build/release
      - name: Re-verify and package signed artifacts
        shell: pwsh
        run: |
          $version = '${{ inputs.tag_name }}'.TrimStart('v')
          ./scripts/release.ps1 -Action Verify -Version $version `
            -SignerSubjectContains $env:SIGNER_SUBJECT_CONTAINS
          ./scripts/release.ps1 -Action Package -Version $version
      - name: Reject portable size growth over 10 percent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build/previous-size -Force | Out-Null
          gh release download --pattern 'snaply-*-win-*.zip' --dir build/previous-size
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous portable release; size baseline starts here."
            exit 0
          }
          foreach ($architecture in @('x64', 'arm64')) {
            $old = Get-ChildItem build/previous-size -Filter "*-win-$architecture.zip" |
              Select-Object -First 1
            $new = Get-ChildItem build/release/package -Filter "*-win-$architecture.zip" |
              Select-Object -First 1
            if ($old -and $new -and $new.Length -gt ($old.Length * 1.10)) {
              throw "$architecture package grew by more than 10%."
            }
          }
      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            build/release/package/*.zip
            build/release/package/*.msixbundle
            build/release/package/SHA256SUMS.txt
      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            build/release/package/*.zip
            build/release/package/*.msixbundle
          sbom-path: build/release/package/snaply.spdx.json
      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: false
          files: build/release/package/*
