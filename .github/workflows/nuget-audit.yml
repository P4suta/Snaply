name: nuget-audit

on:
  push:
    branches: [main]
    paths:
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Build.props"
      - "global.json"
  pull_request:
    paths:
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Build.props"
      - "global.json"
  schedule:
    - cron: "33 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore Snaply.slnx --locked-mode
      - name: Reject vulnerable packages
        shell: pwsh
        run: |
          $json = dotnet package list `
            --project Snaply.slnx `
            --vulnerable --include-transitive --format json --no-restore
          if ($LASTEXITCODE -ne 0) {
            throw "NuGet vulnerability query failed."
          }
          $report = $json | ConvertFrom-Json
          $bad = @(
            foreach ($project in $report.projects) {
              foreach ($framework in $project.frameworks) {
                @($framework.topLevelPackages) + @($framework.transitivePackages) |
                  Where-Object { @($_.vulnerabilities).Count -gt 0 }
              }
            }
          )
          if ($bad.Count) {
            $bad | ConvertTo-Json -Depth 8 | Write-Host
            throw "Vulnerable NuGet packages found."
          }
      - name: Reject deprecated packages
        shell: pwsh
        run: |
          $json = dotnet package list `
            --project Snaply.slnx `
            --deprecated --include-transitive --format json --no-restore
          if ($LASTEXITCODE -ne 0) {
            throw "NuGet deprecation query failed."
          }
          $report = $json | ConvertFrom-Json
          $bad = @(
            foreach ($project in $report.projects) {
              foreach ($framework in $project.frameworks) {
                @($framework.topLevelPackages) + @($framework.transitivePackages) |
                  Where-Object { @($_.deprecationReasons).Count -gt 0 }
              }
            }
          )
          if ($bad.Count) {
            $bad | ConvertTo-Json -Depth 8 | Write-Host
            throw "Deprecated NuGet packages found."
          }
