name: sbom-monitor

on:
  schedule:
    - cron: "7 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rescan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Download latest release SBOM
        id: release
        shell: bash
        run: |
          if ! tag=$(gh release view --json tagName --jq .tagName 2>/dev/null); then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p sbom
          gh release download "$tag" --pattern 'snaply.spdx.json' --dir sbom
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        if: steps.release.outputs.available == 'true'
        with:
          tool: osv-scanner@2.3.6
      - name: Scan shipped SBOM
        id: scan
        if: steps.release.outputs.available == 'true'
        shell: bash
        run: |
          code=0
          osv-scanner scan source -L sbom/snaply.spdx.json \
            --config osv-scanner.toml --format markdown \
            --output osv-report.md || code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
      - name: Open vulnerability issue
        if: steps.scan.outputs.code != '' && steps.scan.outputs.code != '0'
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          body=$(printf 'The shipped SBOM for %s failed the current OSV scan.\n\n%s' \
            "$TAG" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          gh issue create --title "Vulnerability in shipped release $TAG" --body "$body"
      - name: Enforce scan result
        if: steps.scan.outputs.code != '' && steps.scan.outputs.code != '0'
        run: exit 1
