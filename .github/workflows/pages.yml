name: Deploy GitHub Pages

# Publishes the docfx documentation site (conceptual docs + Snaply.Core API
# reference) to GitHub Pages. Requires Settings > Pages > Source = "GitHub
# Actions" (set once after publish).
#
# Runs on ubuntu: the API metadata is generated for Snaply.Core only, which
# targets plain net10.0 and restores/builds anywhere — the Platform/App layers
# (net10.0-windows) are documented conceptually, so no Windows runner is needed.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/Snaply.Core/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: read-only at the top level; the deploy job requests the
# Pages + OIDC writes it needs.
permissions:
  contents: read

# One concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout
      pages: write # publish to GitHub Pages
      id-token: write # OIDC token the Pages deploy environment requires
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-dotnet-mise

      # docfx reads Snaply.Core via MSBuild; restore it first (locked).
      - name: Restore Snaply.Core (locked)
        run: mise exec -- dotnet restore src/Snaply.Core/Snaply.Core.csproj --locked-mode

      - name: Install docfx
        run: mise exec -- dotnet tool install --global docfx --version 2.78.3

      - name: Build docs (metadata + site)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          docfx docs/docfx.json

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
